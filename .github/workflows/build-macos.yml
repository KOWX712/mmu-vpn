name: Build macOS

on:
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Build both architectures
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          cargo build --release --manifest-path daemon/Cargo.toml --target x86_64-apple-darwin
          cargo build --release --manifest-path daemon/Cargo.toml --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p daemon/target/universal/release
          lipo -create \
            daemon/target/x86_64-apple-darwin/release/mmuvpn \
            daemon/target/aarch64-apple-darwin/release/mmuvpn \
            -output daemon/target/universal/release/mmuvpn

      - name: Create App Bundle
        run: |
          APP_BUNDLE="daemon/target/universal/release/MMU VPN.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"

          # Copy binary
          cp daemon/target/universal/release/mmuvpn "${APP_BUNDLE}/Contents/MacOS/mmuvpn"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/mmuvpn"

          # Copy Info.plist
          cp daemon/macos/Info.plist "${APP_BUNDLE}/Contents/Info.plist"

          # Create PkgInfo
          printf "APPL????" > "${APP_BUNDLE}/Contents/PkgInfo"

      - name: Package
        run: |
          cd daemon/target/universal/release
          tar -czf ../../../../mmu-vpn-macos-universal.tar.gz "MMU VPN.app"

      - uses: actions/upload-artifact@v7
        with:
          name: mmu-vpn-macos-universal
          path: mmu-vpn-macos-universal.tar.gz
