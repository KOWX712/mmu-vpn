name: Build

on:
  push:
    branches: master
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential pkg-config libgtk-3-dev libxdo-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Build
        run: cargo build --release --manifest-path daemon/Cargo.toml

      - uses: actions/upload-artifact@v7
        with:
          name: mmu-vpn-binary
          path: daemon/target/release/mmuvpn

  deb:
    needs: build
    uses: ./.github/workflows/build-deb.yml

  rpm:
    needs: build
    uses: ./.github/workflows/build-rpm.yml

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [deb, rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
          pattern: mmu-vpn-*

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
